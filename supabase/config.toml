
[functions.chat]
enabled = true
verify_jwt = true
import_map = "./functions/chat/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/chat/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/chat/*.html" ]



[functions.sync-plytix]
enabled = true
verify_jwt = false  # Intencional: protegida por header x-sync-secret (ver SYNC_SECRET). No requiere JWT de usuario porque la invoca un cron interno, no la app.
import_map = "./functions/sync-plytix/deno.json"
entrypoint = "./functions/sync-plytix/index.ts"

[functions.swift-task]
enabled = true
verify_jwt = true
entrypoint = "./functions/swift-task/index.ts"

