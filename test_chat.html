<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comagro AI - Chat de Pruebas (Sin PIN)</title>
    <!-- Importar Supabase JS desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; height: 100vh; box-sizing: border-box; }
        .container { width: 100%; max-width: 600px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; max-height: 100%; }
        .header { background: #008f39; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .config-panel { padding: 15px; background: #fafafa; border-bottom: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .config-panel input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .config-panel button { padding: 10px; background: #008f39; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .config-panel button:hover { background: #00702c; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; min-height: 300px; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; white-space: pre-wrap; }
        .message.user { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 0; }
        .message.bot { align-self: flex-start; background: white; border-bottom-left-radius: 0; }
        .message.system { align-self: center; background: rgba(0,0,0,0.1); color: #555; font-size: 12px; border-radius: 10px; text-align: center; }
        .input-area { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        .input-area button { padding: 10px 20px; background: #008f39; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .input-area button:disabled { background: #aaa; cursor: not-allowed; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Comagro AI - Pruebas Seguras</div>
    
    <!-- Panel de Configuración -->
    <div id="config-panel" class="config-panel">
        <p style="margin:0; color:#555;"><strong>Conexión:</strong> Pega aquí tu URL y tu Anon Key desde Supabase (o de tu .env.local). <br><em>No necesitas PIN. Esta interfaz ataca a "chat-test", que está abierta para pruebas.</em></p>
        <input type="text" id="url" placeholder="EXPO_PUBLIC_SUPABASE_URL (ej. https://xyz.supabase.co)">
        <input type="password" id="anon_key" placeholder="EXPO_PUBLIC_SUPABASE_ANON_KEY">
        
        <button id="login-btn" onclick="iniciarSesion()">Conectar a chat-test</button>
    </div>

    <!-- Área de Chat -->
    <div id="chat-box" class="chat-box">
        <div class="message system">Por favor, conecta para comenzar a chatear.</div>
    </div>
    
    <!-- Input de Mensaje -->
    <div class="input-area">
        <input type="text" id="message-input" placeholder="Escribe tu consulta..." disabled onkeypress="if(event.key === 'Enter') enviarMensaje()">
        <button id="send-btn" onclick="enviarMensaje()" disabled>Enviar</button>
    </div>
</div>

<script>
    let chatHistory = []; 

    function iniciarSesion() {
        const url = document.getElementById('url').value.trim();
        const key = document.getElementById('anon_key').value.trim();

        if(!url || !key) {
            alert('Por favor completa la URL y la Anon Key.');
            return;
        }

        // Ocultar panel y habilitar chat (¡Sin Auth!)
        document.getElementById('config-panel').classList.add('hidden');
        document.getElementById('message-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        
        document.getElementById('chat-box').innerHTML = '<div class="message system">✅ Conectado a la copia de seguridad "chat-test". <br>Ya no necesitas PIN. ¡Prueba la IA!</div>';
    }

    async function enviarMensaje() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;

        agregarMensajeUI('user', text);
        chatHistory.push({ role: 'user', content: text });
        input.value = '';
        
        input.disabled = true;
        document.getElementById('send-btn').disabled = true;
        const loadingId = agregarMensajeUI('bot', 'Escribiendo...');

        try {
            const url = document.getElementById('url').value.trim();
            const anonKey = document.getElementById('anon_key').value.trim();
            
            // Llamar a chat-test
            const response = await fetch(`${url}/functions/v1/chat-test`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${anonKey}` // Enviamos la Anon Key directo
                },
                body: JSON.stringify({ messages: chatHistory })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || response.statusText);
            }

            const data = await response.json();
            const reply = data.reply || "Sin respuesta";
            
            document.getElementById(loadingId).innerText = reply;
            chatHistory.push({ role: 'assistant', content: reply });

        } catch (error) {
            document.getElementById(loadingId).innerText = "❌ Error: " + error.message;
        } finally {
            input.disabled = false;
            document.getElementById('send-btn').disabled = false;
            input.focus();
            scrollToBottom();
        }
    }

    function agregarMensajeUI(role, text) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.id = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        div.innerText = text;
        chatBox.appendChild(div);
        scrollToBottom();
        return div.id;
    }

    function scrollToBottom() {
        const chatBox = document.getElementById('chat-box');
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
