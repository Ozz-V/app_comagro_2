name: CI Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-checks:
    name: Code Quality and Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Deno Lint & Type Check (Edge Functions)
        run: |
          cd supabase/functions
          deno lint
          deno check **/*.ts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript Check (UI & Logic)
        run: npx tsc --noEmit

      - name: Run ESLint (Strict)
        env:
          ESLINT_USE_FLAT_CONFIG: "false"
        run: npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 0

      - name: Run Tests with Coverage
        run: npx jest --coverage --passWithNoTests
