name: CI Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-checks:
    name: Code Quality and Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        continue-on-error: true
        env:
          ESLINT_USE_FLAT_CONFIG: "false"
        run: npx eslint .
