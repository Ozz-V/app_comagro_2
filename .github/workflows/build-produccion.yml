name: Build Produccion

on:
  workflow_dispatch:
  push:
    branches: [main, "refactor/typescript-migration-final"]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'App.tsx'
      - 'app.json'
      - 'package.json'
      - 'assets/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK Candidate
    runs-on: ubuntu-latest
    env:
      CANDIDATE_TAG: rc-${{ github.run_number }}
      APK_NAME: comagroapp.apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Auto-increment versionCode
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json','utf8'));
            cfg.expo.android.versionCode = (cfg.expo.android.versionCode ?? 0) + 1;
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
            console.log('versionCode =>', cfg.expo.android.versionCode);
          "

      - name: Prebuild Android Project
        run: npx expo prebuild --platform android --clean

      - name: Setup Release Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. Decodificar el keystore desde el secret
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/comagro-release.keystore
          echo "Keystore decodificado: $(ls -lh android/app/comagro-release.keystore)"

          # 2. Escribir keystore.properties sin indentación extra (Gradle es sensible)
          cat > android/keystore.properties << EOF
storeFile=comagro-release.keystore
storePassword=${KEYSTORE_PASSWORD}
keyAlias=${KEY_ALIAS}
keyPassword=${KEY_PASSWORD}
EOF
          echo "keystore.properties creado:"
          cat android/keystore.properties

          # 3. Escribir signing.gradle — archivo de Gradle separado y limpio
          #    Expo prebuild genera build.gradle con 'signingConfigs { debug { ... } }'
          #    Este script lo extiende de forma segura SIN tocar el archivo generado.
          cat > android/app/signing.gradle << 'GRADLE'
def keystorePropsFile = rootProject.file("keystore.properties")
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystoreProps.load(new FileInputStream(keystorePropsFile))
}

android {
    signingConfigs {
        release {
            storeFile     file(keystoreProps['storeFile'])
            storePassword keystoreProps['storePassword']
            keyAlias      keystoreProps['keyAlias']
            keyPassword   keystoreProps['keyPassword']
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}
GRADLE
          echo "signing.gradle creado"

          # 4. Aplicar signing.gradle en build.gradle con una sola línea de sed
          #    Busca 'apply plugin: "com.android.application"' (siempre presente en Expo prebuild)
          #    y agrega 'apply from: "signing.gradle"' justo debajo.
          if ! grep -q 'signing.gradle' android/app/build.gradle; then
            sed -i '/apply plugin: .com.android.application./a apply from: "signing.gradle"' android/app/build.gradle
            echo "signing.gradle aplicado en build.gradle"
          else
            echo "signing.gradle ya estaba aplicado"
          fi

      - name: Security Hardening – allowBackup=false
        run: |
          sed -i 's/android:allowBackup="true"/android:allowBackup="false"/g' android/app/src/main/AndroidManifest.xml
          echo "allowBackup deshabilitado"

      - name: Fix ProGuard – keep Expo Kotlin module classes
        run: |
          echo "" >> android/app/proguard-rules.pro
          echo "# Keep Expo Kotlin module services (fixes NoClassDefFoundError at runtime)" >> android/app/proguard-rules.pro
          echo "-keep class expo.modules.kotlin.** { *; }" >> android/app/proguard-rules.pro
          echo "-keep class expo.modules.filesystem.** { *; }" >> android/app/proguard-rules.pro

      - name: Configure Gradle Memory
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties

      - name: Build APK
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: true
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_EDGE_URL: ${{ secrets.EXPO_PUBLIC_EDGE_URL }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK to comagroapp.apk
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/comagroapp.apk
          echo "APK renombrado a comagroapp.apk"

      - name: Save APK, app.json and metadata
        run: |
          cp android/app/build/outputs/apk/release/comagroapp.apk /tmp/comagroapp.apk
          cp app.json /tmp/app.json
          node -e '
            const fs = require("fs");
            const cfg = JSON.parse(fs.readFileSync("/tmp/app.json", "utf8"));
            const tag = process.env.CANDIDATE_TAG;
            const repo = "Ozz-V/comagro_apk_descargas";
            const versionName = cfg.expo.version;
            const versionCode = cfg.expo.android.versionCode;
            const downloadUrl = `https://github.com/${repo}/releases/download/${tag}/comagroapp.apk`;
            const metadata = {
              candidateTag: tag,
              versionName,
              versionCode,
              downloadUrl,
              releaseNotes: `Actualizacion aprobada v${versionName} (Build ${versionCode})`,
              commit: process.env.GITHUB_SHA,
              createdAt: new Date().toISOString()
            };
            fs.writeFileSync("/tmp/metadata.json", JSON.stringify(metadata, null, 2));
            console.log(JSON.stringify(metadata, null, 2));
          '

      - name: Check GH_PAT_RELEASES Secret
        run: |
          if [ -z "${{ secrets.GH_PAT_RELEASES }}" ]; then
            echo "::error::El secret GH_PAT_RELEASES esta vacio o no existe. Por favor, agregalo en Settings -> Secrets and variables -> Actions."
            exit 1
          else
            echo "Secret GH_PAT_RELEASES detectado correctamente."
          fi

      - name: Create GitHub Release Candidate (Public Repo)
        uses: softprops/action-gh-release@v2
        with:
          repository: Ozz-V/comagro_apk_descargas
          tag_name: ${{ env.CANDIDATE_TAG }}
          name: Candidato ${{ env.CANDIDATE_TAG }}
          prerelease: true
          make_latest: false
          token: ${{ secrets.GH_PAT_RELEASES }}
          files: |
            android/app/build/outputs/apk/release/comagroapp.apk
            /tmp/metadata.json
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_RELEASES }}

      - name: Commit updated versionCode back to branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git diff --staged --quiet || git commit -m "ci: bump versionCode [skip ci]"
          git restore . 
          git pull origin ${{ github.ref_name }} --rebase
          git push origin HEAD:${{ github.ref_name }}
