name: Build APK Comagro

on:
  workflow_dispatch:
  push:
    branches: [main, "refactor/typescript-migration-final"]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'App.js'
      - 'app.json'
      - 'package.json'
      - 'assets/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK Candidate
    runs-on: ubuntu-latest
    env:
      CANDIDATE_TAG: rc-${{ github.run_number }}
      APK_NAME: comagroapp.apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Auto-increment versionCode
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json','utf8'));
            cfg.expo.android.versionCode = (cfg.expo.android.versionCode || 1) + 1;
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
            console.log('versionCode =>', cfg.expo.android.versionCode);
          "

      - name: Prebuild Android Project
        run: npx expo prebuild --platform android --clean

      - name: Setup Release Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Decodificar el keystore desde el secret
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/comagro-release.keystore
          echo "Keystore decodificado: $(ls -lh android/app/comagro-release.keystore)"

          # Escribir keystore.properties (Gradle lo leerá directamente)
          cat > android/keystore.properties << EOF
          storeFile=comagro-release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF
          echo "keystore.properties creado"

          # Inyectar configuración de signing en build.gradle ANTES del bloque android {
          # Usamos un marcador fijo que siempre está en el build.gradle generado por Expo
          python3 -c "
          import re, sys

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          # 1. Agregar lectura de keystore.properties al inicio del archivo
          props_block = '''
          def keystorePropertiesFile = rootProject.file(\"keystore.properties\")
          def keystoreProperties = new Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          '''
          if 'keystorePropertiesFile' not in content:
              content = props_block + content

          # 2. Agregar signingConfig release dentro de signingConfigs { ... }
          release_signing = '''
              release {
                  storeFile file(keystoreProperties['storeFile'])
                  storePassword keystoreProperties['storePassword']
                  keyAlias keystoreProperties['keyAlias']
                  keyPassword keystoreProperties['keyPassword']
              }'''
          if 'signingConfigs' in content and 'keystoreProperties' not in content.split('signingConfigs')[1][:500]:
              content = re.sub(
                  r'(signingConfigs\s*\{)',
                  r'\1' + release_signing,
                  content,
                  count=1
              )

          # 3. Cambiar el signingConfig del buildType release para que use release en vez de debug
          content = re.sub(
              r'(buildTypes\s*\{[^}]*?release\s*\{[^}]*?)signingConfig\s+signingConfigs\.\w+',
              r'\1signingConfig signingConfigs.release',
              content,
              flags=re.DOTALL
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print('build.gradle actualizado con signing de produccion')
          "

      - name: Security Hardening – allowBackup=false
        run: |
          sed -i 's/android:allowBackup="true"/android:allowBackup="false"/g' android/app/src/main/AndroidManifest.xml
          echo "allowBackup deshabilitado"

      - name: Fix ProGuard – keep Expo Kotlin module classes
        run: |
          echo "" >> android/app/proguard-rules.pro
          echo "# Keep Expo Kotlin module services (fixes NoClassDefFoundError at runtime)" >> android/app/proguard-rules.pro
          echo "-keep class expo.modules.kotlin.** { *; }" >> android/app/proguard-rules.pro
          echo "-keep class expo.modules.filesystem.** { *; }" >> android/app/proguard-rules.pro

      - name: Configure Gradle Memory
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties

      - name: Build APK
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: true
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK to comagroapp.apk
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/comagroapp.apk
          echo "APK renombrado a comagroapp.apk"

      - name: Save APK, app.json and metadata
        run: |
          cp android/app/build/outputs/apk/release/comagroapp.apk /tmp/comagroapp.apk
          cp app.json /tmp/app.json
          node -e '
            const fs = require("fs");
            const cfg = JSON.parse(fs.readFileSync("/tmp/app.json", "utf8"));
            const tag = process.env.CANDIDATE_TAG;
            const repo = "Ozz-V/comagro_apk_descargas";
            const versionName = cfg.expo.version;
            const versionCode = cfg.expo.android.versionCode;
            const downloadUrl = `https://github.com/${repo}/releases/download/${tag}/comagroapp.apk`;
            const metadata = {
              candidateTag: tag,
              versionName,
              versionCode,
              downloadUrl,
              releaseNotes: `Actualizacion aprobada v${versionName} (Build ${versionCode})`,
              commit: process.env.GITHUB_SHA,
              createdAt: new Date().toISOString()
            };
            fs.writeFileSync("/tmp/metadata.json", JSON.stringify(metadata, null, 2));
            console.log(JSON.stringify(metadata, null, 2));
          '

      - name: Create GitHub Release Candidate (Public Repo)
        uses: softprops/action-gh-release@v1
        with:
          repository: Ozz-V/comagro_apk_descargas
          tag_name: ${{ env.CANDIDATE_TAG }}
          name: Candidato ${{ env.CANDIDATE_TAG }}
          prerelease: true
          make_latest: false
          files: |
            android/app/build/outputs/apk/release/comagroapp.apk
            /tmp/metadata.json
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_RELEASES }}

      - name: Commit updated versionCode back to branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git diff --staged --quiet || git commit -m "ci: bump versionCode [skip ci]"
          git restore . 
          git pull origin ${{ github.ref_name }} --rebase
          git push origin HEAD:${{ github.ref_name }}
