name: Build APK Comagro
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'App.js'
      - 'app.json'
      - 'package.json'
      - 'assets/**'
permissions:
  contents: write
jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install dependencies
        run: npm ci
      - name: Auto-increment versionCode
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json','utf8'));
            cfg.expo.android.versionCode = (cfg.expo.android.versionCode || 1) + 1;
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
            console.log('versionCode =>', cfg.expo.android.versionCode);
          "
      - name: Prebuild Android Project
        run: npx expo prebuild --platform android --clean
      - name: Configure Gradle Memory
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
      - name: Save APK and app.json to /tmp
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk /tmp/comagro.apk
          cp app.json /tmp/app.json
      - name: Create GitHub Release (publico - descarga directa)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit updated versionCode back to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git diff --staged --quiet || git commit -m "ci: bump versionCode [skip ci]"
          git fetch origin main
          git rebase origin/main || git rebase --skip
          git push origin HEAD:main
      - name: Notify Supabase (Auto-Update)
        run: |
          VERSION=$(node -p "require('/tmp/app.json').expo.version")
          VERSION_CODE=$(node -p "require('/tmp/app.json').expo.android.versionCode")
          APK_URL="https://github.com/Ozz-V/app_comagro_2/releases/latest/download/app-release.apk"
          curl --fail-with-body -X POST 'https://itylpvuzflqlmmqvdhbz.supabase.co/rest/v1/version_apk' \
          -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0eWxwdnV6ZmxxbG1tcXZkaGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjYzMTgsImV4cCI6MjA5MTg0MjMxOH0.yuZ5sWX-Isxd04ySP_ZgDLit1fQDsxoeb25GmU_C_5I" \
          -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0eWxwdnV6ZmxxbG1tcXZkaGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjYzMTgsImV4cCI6MjA5MTg0MjMxOH0.yuZ5sWX-Isxd04ySP_ZgDLit1fQDsxoeb25GmU_C_5I" \
          -H "Content-Type: application/json" \
          -H "Prefer: return=minimal" \
          -d "{ \"version_code\": $VERSION_CODE, \"version_name\": \"$VERSION\", \"release_notes\": \"Actualizacion automatica v$VERSION (Build $VERSION_CODE)\", \"download_url\": \"$APK_URL\" }"
