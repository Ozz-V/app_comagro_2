name: Build APK Comagro

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'App.js'
      - 'app.json'
      - 'package.json'
      - 'assets/**'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android Project
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact (GitHub)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: comagro-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Upload APK to external server (Bypass Quota)
        run: |
          echo "Subiendo a servidor externo alternativo (bashupload)..."
          curl -s -T android/app/build/outputs/apk/release/app-release.apk bashupload.com > upload_result.txt
          URL=$(grep -o 'http.*bashupload.com/.*' upload_result.txt)
          echo "## 🚀 Build Completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **TU GITHUB SE QUEDÓ SIN ESPACIO DE ALMACENAMIENTO.**" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **DESCARGÁ LA APK AQUÍ:** $URL" >> $GITHUB_STEP_SUMMARY
