name: Build APK Comagro

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'App.js'
      - 'app.json'
      - 'package.json'
      - 'assets/**'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android Project
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: comagro-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## 🚀 Build Súper Rápido Completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Descargá el APK desde:**" >> $GITHUB_STEP_SUMMARY
          echo "Actions → este workflow → Artifacts → \`comagro-apk\`" >> $GITHUB_STEP_SUMMARY
