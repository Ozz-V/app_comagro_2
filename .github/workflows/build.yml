name: Build APK Comagro
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'App.js'
      - 'app.json'
      - 'package.json'
      - 'assets/**'
permissions:
  contents: write
jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android Project
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact (GitHub)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: comagro-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Upload APK to Repository Branch (Bypass Quota)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cp android/app/build/outputs/apk/release/app-release.apk /tmp/comagro.apk
          git checkout --orphan apk-builds
          git rm -rf .
          mv /tmp/comagro.apk ./comagro-app.apk
          git add comagro-app.apk
          git commit -m "Deploy APK"
          git push origin apk-builds --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
